name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project DogBoneTavern.xcodeproj \
            -scheme DogBoneTavern \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Make unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build -name "DogBoneTavern.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ 没找到 DogBoneTavern.app"
            find build -maxdepth 5 -type d
            exit 1
          fi

          echo "✅ 找到 App: $APP_PATH"
          cp -R "$APP_PATH" Payload/DogBoneTavern.app
          zip -r DogBoneTavern-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: DogBoneTavern-unsigned-ipa
          path: DogBoneTavern-unsigned.ipa
